<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Big Spaceship · AI Transformation Roadmap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1a1a;
      --ink-mid: #555;
      --ink-light: #888;
      --rule: #E5E5E5;
      --surface: #F7F7F7;
      --orange: #E8612A;
      --blue: #3B82F6;
      --emerald: #10B981;
      --violet: #8B5CF6;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: #fff;
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 15px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    

    /* ── Nav ── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fff;
      border-bottom: 1px solid var(--rule);
      padding: 0 48px;
    }
    .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .nav-inner::-webkit-scrollbar { display: none; }
    .nav-wordmark {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink);
      padding: 16px 24px 16px 0;
      border-right: 1px solid var(--rule);
      margin-right: 8px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .nav-group {
      display: flex;
      align-items: center;
      gap: 0;
    }
    .nav-divider {
      width: 1px;
      height: 20px;
      background: var(--rule);
      margin: 0 8px;
      flex-shrink: 0;
    }
    .tab-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: var(--ink-light);
      background: none;
      border: none;
      padding: 16px 14px;
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .tab-btn:hover { color: var(--ink); }
    .tab-btn.active { color: var(--ink); border-bottom-color: var(--ink); font-weight: 500; }
    .tab-btn[data-tab="brand"].active     { border-bottom-color: var(--orange); color: var(--orange); }
    .tab-btn[data-tab="creative"].active  { border-bottom-color: var(--blue); color: var(--blue); }
    .tab-btn[data-tab="production"].active{ border-bottom-color: var(--emerald); color: var(--emerald); }
    .tab-btn[data-tab="apm"].active       { border-bottom-color: var(--orange); color: var(--orange); }
    .tab-btn[data-tab="internal"].active  { border-bottom-color: var(--violet); color: var(--violet); }
    .tab-btn[data-tab="equip"].active      { border-bottom-color: var(--blue);    color: var(--blue); }
    .tab-btn[data-tab="enable"].active     { border-bottom-color: var(--emerald); color: var(--emerald); }
    .tab-btn[data-tab="communicate"].active{ border-bottom-color: var(--violet);  color: var(--violet); }

    /* ── Page layout ── */

    /* ── Overview page ── */
    .overview-hero {
      padding: 56px 0 48px;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 48px;
    }
    .overview-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 16px;
    }
    .overview-hero h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 44px;
      line-height: 1.1;
      color: var(--ink);
      margin-bottom: 12px;
    }
    .overview-hero h1 em { font-style: italic; color: var(--orange); }
    .overview-hero p {
      font-size: 15px;
      color: var(--ink-mid);
      max-width: 600px;
      line-height: 1.7;
    }

    /* ── Pillars grid ── */
    .pillars-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 48px;
    }
    .pillar-card {
      border: 1px solid var(--rule);
      border-radius: 10px;
      padding: 24px 26px;
      position: relative;
    }
    .pillar-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 10px 10px 0 0;
    }
    .pillar-card.p1::before { background: var(--orange); }
    .pillar-card.p2::before { background: var(--blue); }
    .pillar-card.p3::before { background: var(--emerald); }
    .pillar-card.p4::before { background: var(--violet); }
    .pillar-num {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .p1 .pillar-num { color: var(--orange); }
    .p2 .pillar-num { color: var(--blue); }
    .p3 .pillar-num { color: var(--emerald); }
    .p4 .pillar-num { color: var(--violet); }
    .pillar-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--ink);
    }
    .pillar-desc {
      font-size: 13px;
      color: var(--ink-mid);
      line-height: 1.65;
    }
    .pillar-bullets {
      list-style: none;
      margin-top: 14px;
    }
    .pillar-bullets li {
      font-size: 12px;
      color: var(--ink-mid);
      padding: 5px 0 5px 16px;
      border-bottom: 1px solid var(--rule);
      position: relative;
    }
    .pillar-bullets li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--ink-light);
      font-size: 10px;
    }

    /* ── Decisions / KPI blocks ── */
    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 12px;
      margin-top: 40px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--rule); }

    .decision-row {
      display: flex;
      gap: 24px;
      padding: 14px 0;
      border-bottom: 1px solid var(--rule);
    }
    .decision-key {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--ink-light);
      min-width: 160px;
      padding-top: 2px;
      flex-shrink: 0;
    }
    .decision-val {
      font-size: 14px;
      color: var(--ink);
      line-height: 1.6;
    }
    .decision-val strong { font-weight: 500; }

    .kpis-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 48px;
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 8px;
      padding: 18px 20px;
    }
    .kpi-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 6px;
    }
    .kpi-text { font-size: 13px; color: var(--ink); line-height: 1.55; }

    /* ── Phase pages ── */
    .phase-hero {
      padding-bottom: 32px;
      border-bottom: 3px solid var(--ink);
      margin-bottom: 40px;
    }
    .phase-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 10px;
    }
    .phase-hero h2 {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 8px;
    }
    .phase-hero p { font-size: 14px; color: var(--ink-mid); max-width: 560px; }
    .phase-steps {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .phase-step {
      display: flex;
      gap: 24px;
      padding: 20px 0;
      border-bottom: 1px solid var(--rule);
      align-items: flex-start;
    }
    .step-num {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--ink-light);
      min-width: 32px;
      padding-top: 3px;
      flex-shrink: 0;
    }
    .step-content { flex: 1; }
    .step-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .step-detail { font-size: 13px; color: var(--ink-mid); line-height: 1.6; }
    .step-tag {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      padding: 2px 8px;
      border-radius: 3px;
      background: var(--surface);
      border: 1px solid var(--rule);
      color: var(--ink-light);
      white-space: nowrap;
      align-self: flex-start;
      margin-top: 3px;
      flex-shrink: 0;
    }

    /* ── Shared doc styles ── */
    h2 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 32px;
      line-height: 1.1;
      color: var(--ink);
      margin-bottom: 8px;
    }
    h2 em { font-style: italic; }
    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .doc-subhead { font-size: 14px; color: var(--ink-mid); max-width: 580px; }
    .context-box {
      border-left: 3px solid var(--ink);
      padding: 16px 20px;
      font-size: 14px;
      line-height: 1.7;
      color: var(--ink);
      border-radius: 0 6px 6px 0;
    }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
    .already-list { list-style: none; }
    .already-list li {
      padding: 8px 0 8px 22px;
      border-bottom: 1px solid var(--rule);
      font-size: 13px;
      color: var(--ink-mid);
      position: relative;
      line-height: 1.5;
    }
    .already-list li::before {
      content: '✓';
      position: absolute;
      left: 0;
      color: #16A34A;
      font-size: 11px;
      top: 10px;
      font-family: 'DM Mono', monospace;
    }
    blockquote {
      border-left: 2px solid var(--rule);
      padding: 6px 14px;
      margin-bottom: 10px;
      font-size: 13px;
      color: var(--ink-mid);
      font-style: italic;
      line-height: 1.6;
    }
    .goals-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .goal-card { background: var(--surface); border: 1px solid var(--rule); border-radius: 8px; padding: 16px 18px; }
    .goal-num { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ink-light); margin-bottom: 6px; }
    .goal-text { font-size: 13px; font-weight: 500; color: var(--ink); margin-bottom: 4px; }
    .goal-sub { font-size: 12px; color: var(--ink-light); }
    .blueprint { margin-top: 0; }
    .table-wrap { border: 1px solid var(--rule); border-radius: 8px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--ink); }
    thead th {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      padding: 11px 14px;
      text-align: left;
      font-weight: 400;
    }
    thead th.th-center { text-align: center; }
    tbody tr { border-bottom: 1px solid var(--rule); }
    tbody tr:last-child { border-bottom: none; }
    .td-task { padding: 13px 14px; font-size: 13px; font-weight: 400; color: var(--ink); line-height: 1.45; width: 26%; }
    .td-area { padding: 13px 14px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ink-light); width: 13%; vertical-align: top; padding-top: 16px; line-height: 1.4; }
    .td-signal { padding: 13px 14px; font-size: 12px; color: var(--ink-mid); width: 22%; line-height: 1.45; }
    .td-center { padding: 13px 10px; text-align: center; width: 9%; vertical-align: top; padding-top: 15px; }
    .td-impact { padding: 10px 12px; width: 18%; vertical-align: top; }
    .td-disciplines { padding: 13px 14px; font-size: 11px; color: var(--ink-mid); width: 18%; line-height: 1.6; }
    .pill { display: inline-block; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.08em; padding: 3px 8px; border-radius: 100px; text-transform: uppercase; white-space: nowrap; }
    .pill-urgent  { background: #FEE2E2; color: #991B1B; }
    .pill-semi    { background: #FEF3C7; color: #92400E; }
    .pill-back    { background: #F3F4F6; color: #6B7280; }
    .pill-build   { background: #FEF3ED; color: #9A3412; border: 1px solid #FDBA74; }
    .pill-buy     { background: #EFF6FF; color: #1D4ED8; border: 1px solid #BFDBFE; }
    .pill-backlog { background: #F3F4F6; color: #6B7280; }
    .impact-badge { display: inline-block; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.08em; padding: 2px 7px; border-radius: 100px; text-transform: uppercase; white-space: nowrap; margin-bottom: 2px; }
    .impact-hrs { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ink); font-weight: 500; margin: 3px 0 2px; }
    .impact-note { font-size: 11px; color: var(--ink-light); line-height: 1.4; }
    .disc-tag { display: inline-block; font-family: 'DM Mono', monospace; font-size: 9px; padding: 2px 6px; border-radius: 3px; margin: 1px 2px 1px 0; background: #F3F4F6; color: #555; border: 1px solid #E5E5E5; }
    .disc-tag.all { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .footer-note { padding: 20px 24px; background: var(--surface); border: 1px solid var(--rule); border-radius: 8px; font-size: 13px; color: var(--ink-mid); line-height: 1.65; display: flex; gap: 12px; }
    .footer-note strong { color: var(--ink); font-weight: 500; }

    /* ── On the board ── */
    .onboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 48px;
    }
    .onboard-col {
      border: 1px solid var(--rule);
      border-radius: 10px;
      overflow: hidden;
    }
    .onboard-header {
      background: var(--surface);
      border-bottom: 1px solid var(--rule);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .onboard-tag {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 100px;
      border: 1px solid var(--rule);
      color: var(--ink-light);
      white-space: nowrap;
    }
    .onboard-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
    }
    .onboard-list {
      list-style: none;
      padding: 8px 0;
    }
    .onboard-list li {
      padding: 12px 18px;
      border-bottom: 1px solid var(--rule);
    }
    .onboard-list li:last-child { border-bottom: none; }
    .onboard-item-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 3px;
    }
    .onboard-item-sub {
      font-size: 12px;
      color: var(--ink-light);
      line-height: 1.5;
    }  }
    

    /* ── Parallel paths ── */
    .parallel-paths {
      border: 1px solid var(--rule);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 48px;
    }
    .parallel-header {
      display: grid;
      grid-template-columns: 120px repeat(5, 1fr);
      background: var(--ink);
      padding: 0;
    }
    .parallel-header .ph-phase:first-child { grid-column: 2; }
    .ph-phase {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      padding: 10px 12px;
      border-left: 1px solid rgba(255,255,255,0.08);
    }
    .ph-phase span {
      display: block;
      color: rgba(255,255,255,0.25);
      font-size: 8px;
      margin-top: 2px;
      letter-spacing: 0.08em;
    }
    .parallel-row {
      display: grid;
      grid-template-columns: 120px 1fr;
      border-bottom: 1px solid var(--rule);
      min-height: 56px;
    }
    .parallel-label {
      padding: 14px 14px 14px 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: var(--surface);
      border-right: 1px solid var(--rule);
    }
    .pl-num {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      margin-bottom: 3px;
    }
    .pl-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--ink);
    }
    .parallel-bar-wrap {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      padding: 8px;
      align-items: center;
    }
    .pbar {
      border-radius: 5px;
      padding: 6px 8px;
      font-size: 10px;
      color: var(--ink-mid);
      line-height: 1.4;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 40px;
      justify-content: center;
    }
    .pbar-empty {
      background: transparent !important;
      border: 1px dashed var(--rule) !important;
    }
    .pbar-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-bottom: 2px;
    }
  
  .tab-panel-inner { max-width: 960px; margin: 0 auto; padding: 48px 48px 96px; }

  </style>
</head>
<body>
  <nav class="nav"><div class="nav-inner">
      <div class="nav-wordmark" id="wordmark" onclick="go('overview')" style="cursor:pointer">Big Spaceship AI</div>

      <button class="tab-btn" data-tab="production" onclick="go('production')">Production</button>

      <button class="tab-btn" data-tab="pm" onclick="go('pm')">Program Mgmt</button>
      <div class="nav-divider" style="margin:0 4px;background:#ddd"></div>
      <button class="tab-btn" data-tab="growth" onclick="go('growth')">Growth</button>

      <button class="tab-btn" data-tab="people" onclick="go('people')">People & Culture</button>
      <button class="tab-btn" data-tab="foundations" onclick="go('foundations')">Foundations</button>

  </div></nav>
  <div id="main" class="tab-panel-inner"></div>
  <script>
const PANELS = {
  overview: `<div class="overview-hero">
      <div class="overview-eyebrow">Big Spaceship AI & Automation Initiative</div>
      <h1>Here's what<br>we're <em>doing.</em></h1>
      <p>This is a statement of direction, not a request for approval. Flag any area where you see a meaningful gap, conflict, or concern.</p>
    </div>

    <div class="section-label" style="margin-top:0">The four pillars</div>
    <div class="pillars-grid">
      <div class="pillar-card p1">
        <div class="pillar-num">Pillar 01 — Eliminate</div>
        <div class="pillar-title">100 Tasks That Suck</div>
        <div class="pillar-desc">Surface and automate the work that drains time across every discipline. Scored by resource drain, repeatability, and human value.</div>
        <ul class="pillar-bullets">
          <li>Build on existing workflow docs — not starting over</li>
          <li>Gap-fill sessions per discipline</li>
          <li>Build / Buy / Backlog per task</li>
          <li>Scored: 1 = Backburner, 2 = Semi-urgent, 3 = Urgent</li>
        </ul>
      </div>
      <div class="pillar-card p2">
