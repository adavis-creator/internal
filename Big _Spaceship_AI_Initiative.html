<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big Spaceship AI Initiative</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
:root {
      --ink: #1a1a1a;
      --ink-mid: #555;
      --ink-light: #888;
      --rule: #E5E5E5;
      --surface: #F7F7F7;
      --orange: #E8612A;
      --blue: #3B82F6;
      --emerald: #10B981;
      --violet: #8B5CF6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: #fff;
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 15px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: #fff; border-bottom: 1px solid var(--rule); padding: 0 48px;
    }
    .nav-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center; gap: 0;
      overflow-x: auto; scrollbar-width: none;
    }
    .nav-inner::-webkit-scrollbar { display: none; }
    .nav-wordmark {
      font-family: 'DM Mono', monospace; font-size: 11px;
      letter-spacing: 0.18em; text-transform: uppercase;
      padding: 16px 24px 16px 0; border-right: 1px solid var(--rule);
      margin-right: 8px; white-space: nowrap; flex-shrink: 0; cursor: pointer;
    }
    .nav-divider { width: 1px; height: 20px; background: var(--rule); margin: 0 8px; flex-shrink: 0; }
    .tab-btn {
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 400;
      color: var(--ink-light); background: none; border: none;
      padding: 16px 14px; cursor: pointer; white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s; flex-shrink: 0;
    }
    .tab-btn:hover { color: var(--ink); }
    .tab-panel-inner { max-width: 960px; margin: 0 auto; padding: 48px 48px 96px; }

    .section-label {
      font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--ink-light);
      margin-bottom: 12px; margin-top: 40px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--rule); }

    /* ── Overview ── */
    .overview-hero {
      padding: 48px 0 36px; border-bottom: 1px solid var(--rule); margin-bottom: 40px;
    }
    .overview-eyebrow {
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--ink-light); margin-bottom: 16px;
    }
    .overview-hero h1 {
      font-family: 'Playfair Display', serif; font-weight: 700;
      font-size: 44px; line-height: 1.1; color: var(--ink); margin-bottom: 18px;
    }
    .overview-hero h1 em { font-style: italic; color: var(--orange); }
    .overview-hero p { font-size: 15px; color: var(--ink-mid); max-width: 640px; line-height: 1.8; }

    .pillar-status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 48px; }
    .pillar-status-card {
      border: 1px solid var(--rule); border-radius: 10px; overflow: hidden;
      cursor: pointer; transition: box-shadow 0.15s;
    }
    .pillar-status-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .psc-header {
      padding: 16px 20px 14px; border-bottom: 1px solid var(--rule);
      display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
    }
    .psc-eyebrow {
      font-family: 'DM Mono', monospace; font-size: 9px;
      letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 5px;
    }
    .psc-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--ink); }
    .psc-status-dot {
      font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.08em;
      padding: 3px 9px; border-radius: 100px; white-space: nowrap; margin-top: 2px; flex-shrink: 0;
    }
    .status-active   { background: #F0FDF4; color: #15803D; border: 1px solid #BBF7D0; }
    .status-inprog   { background: #EFF6FF; color: #1D4ED8; border: 1px solid #BFDBFE; }
    .status-upcoming { background: #FEF3C7; color: #92400E; border: 1px solid #FCD34D; }
    .psc-body { padding: 16px 20px; }
    .psc-summary { font-size: 13px; color: var(--ink-mid); line-height: 1.65; margin-bottom: 14px; }
    .psc-items { list-style: none; }
    .psc-items li {
      font-size: 12px; color: var(--ink-mid); padding: 5px 0 5px 14px;
      border-bottom: 1px solid var(--rule); position: relative; line-height: 1.5;
    }
    .psc-items li:last-child { border-bottom: none; }
    .psc-items li::before { content: '—'; position: absolute; left: 0; color: var(--ink-light); font-size: 10px; }
    .psc-items li strong { font-weight: 500; color: var(--ink); }

    .kpis-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 40px; }
    .kpi-card { background: var(--surface); border: 1px solid var(--rule); border-radius: 8px; padding: 18px 20px; }
    .kpi-label {
      font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--ink-light); margin-bottom: 6px;
    }
    .kpi-target { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; color: var(--ink); margin-bottom: 4px; line-height: 1.2; }
    .kpi-text { font-size: 12px; color: var(--ink-mid); line-height: 1.5; }

    /* ── Initiatives / Roadmap page ── */
    .roadmap-hero {
      padding: 48px 0 36px; border-bottom: 3px solid var(--orange); margin-bottom: 40px;
    }
    .roadmap-eyebrow {
      font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--orange); margin-bottom: 10px;
    }
    .roadmap-hero h2 {
      font-family: 'Playfair Display', serif; font-size: 40px; font-weight: 700;
      line-height: 1.1; color: var(--ink); margin-bottom: 10px;
    }
    .roadmap-hero h2 em { font-style: italic; color: var(--orange); }
    .roadmap-hero p { font-size: 14px; color: var(--ink-mid); max-width: 580px; line-height: 1.7; }

    .theme-section { margin-bottom: 40px; }
    .theme-header-bar {
      background: var(--ink); border-radius: 8px 8px 0 0;
      padding: 14px 20px; display: flex; align-items: baseline; gap: 16px;
    }
    .theme-bar-label {
      font-family: 'DM Mono', monospace; font-size: 9px;
      letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.45);
      white-space: nowrap; flex-shrink: 0;
    }
    .theme-bar-title { font-size: 14px; font-weight: 500; color: #fff; }
    .theme-bar-desc { font-size: 12px; color: rgba(255,255,255,0.4); margin-left: auto; white-space: nowrap; flex-shrink: 0; }
    .theme-init-list {
      border: 1px solid var(--rule); border-top: none;
      border-radius: 0 0 8px 8px; overflow: hidden;
    }
    .theme-init-row {
      display: grid; grid-template-columns: 52px 1fr auto;
      border-bottom: 1px solid var(--rule); align-items: stretch;
    }
    .theme-init-row:last-child { border-bottom: none; }
    .theme-init-row:nth-child(odd)  { background: #fff; }
    .theme-init-row:nth-child(even) { background: #FAFAFA; }
    .tir-num {
      font-family: 'DM Mono', monospace; font-size: 18px; color: #D1D5DB;
      padding: 20px 0 18px 18px; display: flex; align-items: flex-start;
    }
    .tir-body { padding: 16px 20px 16px 12px; }
    .tir-eyebrow {
      font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--ink-light); margin-bottom: 4px;
    }
    .tir-title { font-size: 14px; font-weight: 500; color: var(--ink); margin-bottom: 4px; }
    .tir-desc { font-size: 12px; color: var(--ink-mid); line-height: 1.6; margin-bottom: 8px; }
    .tir-bullets { list-style: none; }
    .tir-bullets li {
      font-size: 11px; color: var(--ink-light);
      padding: 2px 0 2px 12px; position: relative; line-height: 1.5;
    }
    .tir-bullets li::before { content: '—'; position: absolute; left: 0; font-size: 9px; }
    .tir-meta {
      padding: 16px 20px 16px 0;
      display: flex; flex-direction: column; align-items: flex-end;
      gap: 6px; min-width: 120px;
    }
    .tir-timeline {
      font-family: 'DM Mono', monospace; font-size: 9px;
      letter-spacing: 0.08em; color: var(--ink-light); white-space: nowrap;
    }
    .budget-tag {
      font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 3px 8px; border-radius: 100px; white-space: nowrap;
    }
    .budget-agency  { background: #F0FDF4; color: #15803D; border: 1px solid #BBF7D0; }
    .budget-steerco { background: #FEF3C7; color: #92400E; border: 1px solid #FCD34D; }
    .budget-exco    { background: #FEE2E2; color: #991B1B; border: 1px solid #FECACA; }
    .tir-status { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.06em; }

    .table-wrap { border: 1px solid var(--rule); border-radius: 8px; overflow: hidden; margin-bottom: 48px; }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--ink); }
    thead th {
      font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.15em;
      text-transform: uppercase; color: rgba(255,255,255,0.6);
      padding: 11px 14px; text-align: left; font-weight: 400;
    }
    tbody tr { border-bottom: 1px solid var(--rule); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:nth-child(odd)  td { background: #FAFAFA; }
    tbody tr:nth-child(even) td { background: #fff; }
    tbody td { padding: 11px 14px; font-size: 13px; color: var(--ink); vertical-align: top; line-height: 1.5; }
    .td-mono { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ink-mid); }

    /* ── Pillar pages ── */
    .pillar-hero {
      padding: 48px 0 36px; border-bottom: 1px solid var(--rule); margin-bottom: 40px;
    }
    .pillar-hero-eyebrow {
      font-family: 'DM Mono', monospace; font-size: 10px;
      letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 10px;
    }
    .pillar-hero h2 {
      font-family: 'Playfair Display', serif; font-size: 40px; font-weight: 700;
      line-height: 1.1; color: var(--ink); margin-bottom: 10px;
    }
    .pillar-hero h2 em { font-style: italic; }
    .pillar-hero p { font-size: 14px; color: var(--ink-mid); max-width: 580px; line-height: 1.7; }

    .ws-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 48px; }
    .ws-card { border: 1px solid var(--rule); border-radius: 10px; padding: 22px 24px; }
    .ws-num {
      font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--ink-light); margin-bottom: 8px;
    }
    .ws-title { font-size: 15px; font-weight: 500; color: var(--ink); margin-bottom: 6px; }
    .ws-desc { font-size: 13px; color: var(--ink-mid); line-height: 1.65; }
    .ws-bullets { list-style: none; margin-top: 10px; }
    .ws-bullets li {
      font-size: 12px; color: var(--ink-mid);
      padding: 4px 0 4px 14px; border-bottom: 1px solid var(--rule);
      position: relative; line-height: 1.5;
    }
    .ws-bullets li:last-child { border-bottom: none; }
    .ws-bullets li::before { content: '—'; position: absolute; left: 0; color: var(--ink-light); font-size: 10px; }

    .plan-table { width: 100%; border-collapse: collapse; }
    .plan-table th {
      font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(255,255,255,0.6); background: var(--ink);
      padding: 10px 14px; text-align: left; font-weight: 400;
    }
    .plan-table td {
      padding: 11px 14px; font-size: 12px; color: var(--ink);
      border-bottom: 1px solid var(--rule); vertical-align: top; line-height: 1.5;
    }
    .plan-table tr:last-child td { border-bottom: none; }
    .plan-table tr:nth-child(odd)  td { background: #FAFAFA; }
    .plan-table tr:nth-child(even) td { background: #fff; }
    .plan-week { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--ink-light); width: 80px; }

    .pillar-quote {
      border-left: 3px solid var(--rule); padding: 14px 20px; margin-bottom: 12px;
      font-size: 14px; font-style: italic; color: var(--ink-mid); line-height: 1.7;
    }
    .pillar-footer {
      padding: 20px 24px; background: var(--surface); border: 1px solid var(--rule);
      border-radius: 8px; font-size: 13px; color: var(--ink-mid); line-height: 1.65; font-style: italic;
    }

    /* ── Timeline ── */
    .timeline-wrap {
      border: 1px solid var(--rule); border-radius: 10px; overflow: hidden; margin-bottom: 8px;
    }
    .timeline-months {
      display: grid; grid-template-columns: 130px repeat(6, 1fr) 50px 1fr;
      background: var(--ink);
    }
    .tl-corner {
      padding: 10px 14px;
      font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 0.12em;
      text-transform: uppercase; color: rgba(255,255,255,0.3);
    }
    .tl-month {
      padding: 10px 0; text-align: center;
      font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 0.08em;
      text-transform: uppercase; color: rgba(255,255,255,0.4);
      border-left: 1px solid rgba(255,255,255,0.06);
    }
    .tl-month.tl-now {
      color: #fff; background: rgba(255,255,255,0.08);
    }
    .timeline-row {
      display: grid; grid-template-columns: 130px repeat(6, 1fr) 50px 1fr;
      border-bottom: 1px solid var(--rule); min-height: 44px;
    }
    .timeline-row:last-child { border-bottom: none; }
    .timeline-row:nth-child(odd)  .tl-label { background: #fff; }
    .timeline-row:nth-child(even) .tl-label { background: #FAFAFA; }
    .timeline-row:nth-child(odd)  .tl-cells { background: #fff; }
    .timeline-row:nth-child(even) .tl-cells { background: #FAFAFA; }
    .tl-label {
      padding: 0 14px;
      display: flex; flex-direction: column; justify-content: center;
      border-right: 1px solid var(--rule);
    }
    .tl-label-name {
      font-size: 11px; font-weight: 500; color: var(--ink); line-height: 1.3;
    }
    .tl-label-sub {
      font-family: 'DM Mono', monospace; font-size: 8px;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--ink-light); margin-top: 2px;
    }
    .tl-cells {
      display: grid; grid-template-columns: repeat(6, 1fr);
      grid-column: 2 / 8; align-items: center; padding: 6px 4px;
    }
    .tl-bar {
      height: 20px; border-radius: 3px;
      display: flex; align-items: center; padding: 0 6px;
      font-family: 'DM Mono', monospace; font-size: 8px;
      color: rgba(0,0,0,0.5); white-space: nowrap; overflow: hidden;
    }
    .tl-now-line {
      position: relative;
    }
    .tl-now-line::before {
      content: '';
      position: absolute; top: 0; bottom: 0;
      left: calc(var(--now-col) * 100% / 12);
      width: 2px; background: rgba(232,97,42,0.4);
      pointer-events: none;
    }
/* Override panel width for timeline — needs room */
.panel-wide { max-width: 1200px; margin: 0 auto; padding: 48px 48px 96px; }
</style>
</head>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-wordmark" id="nav-home" onclick="switchTab('overview')" style="border-bottom:2px solid transparent;cursor:pointer">
      Big Spaceship AI
    </div>
    <div class="nav-divider"></div>
    <button class="tab-btn" data-tab="initiatives" onclick="switchTab('initiatives')">Initiatives</button>
    <button class="tab-btn" data-tab="equip"       onclick="switchTab('equip')">Equip</button>
    <button class="tab-btn" data-tab="enable"      onclick="switchTab('enable')">Enable</button>
    <button class="tab-btn" data-tab="communicate" onclick="switchTab('communicate')">Communicate</button>
  </div>
</nav>

<div id="panel-container" class="tab-panel-inner"></div>

<script>

  initiatives: '#E8612A',

// ── Panel HTML strings ────────────────────────────────────────────────────────
const PANELS = {

</div>

<div class="section-label">How we measure success</div>
<div class="kpis-grid">
  <div class="kpi-card">
    <div class="kpi-label">Tool Adoption</div>
    <div class="kpi-target">100%</div>

const NOW_MONTH = 4;
const COLOR_MAP = {
  orange:  { bg: "rgba(232,97,42,0.13)",  border: "rgba(232,97,42,0.35)",  tail: "rgba(232,97,42,0.05)"  },
  blue:    { bg: "rgba(59,130,246,0.13)", border: "rgba(59,130,246,0.35)", tail: "rgba(59,130,246,0.05)" },

};
const STATUS_MAP = {
  complete: { label: "● Complete",    color: "#15803D" },
  active:   { label: "● In progress", color: "#1D4ED8" },
  upcoming: { label: "● Upcoming",    color: "#92400E" },
};
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun"];
function buildTimeline() {
  const headerCells = MONTHS.map((m, i) => {
    const isCurrent = (i + 1) === NOW_MONTH;
    return `<div class="tl-month${isCurrent ? " tl-now" : ""}">${m}${isCurrent ? " ◂" : ""}</div>`;
  }).join("")
    + `<div class="tl-month" style="color:rgba(255,255,255,0.25);font-size:7px;letter-spacing:0.04em">Q3+</div>`
    + `<div class="tl-month" style="color:rgba(255,255,255,0.6);font-size:8px;letter-spacing:0.1em;text-align:left;padding-left:10px">Next Steps</div>`;

  const rows = TIMELINE.map((item) => {
    if (item.divider) {
      return `
  <div style="display:grid;grid-template-columns:130px 1fr;background:var(--surface);border-bottom:1px solid var(--rule);">
    <div style="grid-column:1/10;padding:8px 14px;font-family:'DM Mono',monospace;font-size:8px;letter-spacing:0.15em;text-transform:uppercase;color:var(--ink-light);">${item.label}</div>
  </div>`;
    }

    const { bg, border, tail } = COLOR_MAP[item.color];
    const { label: statusLabel, color: statusColor } = STATUS_MAP[item.status];
    const fade = item.status === "complete" ? "opacity:0.55;" : "";

    const displayEnd = Math.min(item.end, 6);
    const overflows  = item.end > 6 || item.ongoing;
    const spanText   = item.start === displayEnd ? `Mth ${item.start}` : `Mths ${item.start}–${displayEnd}`;

    const solidBar = `<div style="grid-column:${item.start}/${displayEnd + 1};padding:6px 4px;">
        <div class="tl-bar" style="background:${bg};border:1px solid ${border};${fade}">${spanText}</div>
      </div>`;

    const overflowCell = overflows
      ? `<div style="grid-column:8/9;padding:6px 4px;">
          <div class="tl-bar" style="background:${tail};border:1px dashed ${border};opacity:0.6;font-size:7px;color:var(--ink-light);justify-content:center">→</div>
        </div>`
      : `<div style="grid-column:8/9;"></div>`;

    const nextCell = `<div style="grid-column:9/10;padding:10px 12px;display:flex;align-items:center;border-left:1px solid var(--rule);">
        <span style="font-size:11px;color:var(--ink-mid);line-height:1.5;">${item.next || ""}</span>
      </div>`;

    return `
  <div class="timeline-row">
    <div class="tl-label">
      <div class="tl-label-name">${item.num} ${item.label}</div>
      <div class="tl-label-sub" style="color:${statusColor}">${statusLabel}</div>
    </div>
    <div class="tl-cells" style="grid-column:2/8;">
      ${solidBar}
    </div>
    ${overflowCell}
    ${nextCell}
  </div>`;
  }).join("");

  return `<div class="section-label">Initiative timeline — Q1 / Q2</div>
<div class="timeline-wrap">
  <div class="timeline-months">
    <div class="tl-corner">Track</div>
    ${headerCells}
  </div>
  ${rows}
</div>
<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--ink-light);letter-spacing:0.08em;margin-bottom:48px;padding-top:8px">◂ Apr 2026 — current month &nbsp;·&nbsp; → continues into Q3+</div>`;
}

// ── Tab switching ─────────────────────────────────────────────────────────────
let active = 'overview';

function switchTab(id) {
  active = id;
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // Nav styles
  document.querySelectorAll('.tab-btn').forEach(btn => {
    const t = btn.dataset.tab;
    btn.style.borderBottomColor = (t === id) ? ACCENT[id] : 'transparent';
    btn.style.color = (t === id) ? ACCENT[id] : '#888';
    btn.style.fontWeight = (t === id) ? '500' : '400';
  });

  // Wordmark home highlight
  const wm = document.getElementById('nav-home');
  wm.style.borderBottomColor = (id === 'overview') ? '#1a1a1a' : 'transparent';
  wm.style.color = (id === 'overview') ? '#1a1a1a' : '#888';

  // Panel content — overview uses wide layout for timeline
  const container = document.getElementById('panel-container');
  const isOverview = id === 'overview';
  container.className = isOverview ? 'panel-wide' : 'tab-panel-inner';

  let html = PANELS[id];
  if (id === 'overview') {
    html = html.replace('__TIMELINE_PLACEHOLDER__', buildTimeline());
  }
  container.innerHTML = html;
}

// Listen for card clicks that fire switch-tab events
window.addEventListener('switch-tab', e => switchTab(e.detail));
